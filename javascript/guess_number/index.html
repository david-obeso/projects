<!DOCTYPE html>
<html lang="en">

<head>
    <title>Number Guesser</title>
    <link href="styles.css" rel="stylesheet">
    <script src="scripts.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
</head>

<body>
    <h1>Guess the Number!</h1>
    <p>I am thinking of a number between 1 and 10...</p>

    <input type="number" id="user-guess" placeholder="Enter a number...">
    <button type="button" id="guess-btn">Guess!</button>

    <h2 id="feedback-message"></h2>
    <h3 id="attempts">Attempts: 0</h3>
</body>

</html>
